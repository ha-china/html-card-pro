        const host = typeof overlay !== 'undefined' && overlay ? overlay : document.body;
        host.appendChild(wrapper);
        root.__studyRoomAcFullScreenOverlay = wrapper;

        wrapper.addEventListener('click', (event) => {
          const target = event.target.closest('[data-action]');
          if (!target || !wrapper.contains(target) || target.disabled) return;

          const action = target.dataset.action;

          if (action === 'close') {
            closeOverlay();
            return;
          }

          if (action === 'power') {
            togglePower();
          }

          if (action === 'temp-down') {
            adjustTemperature(-1);
          }

          if (action === 'temp-up') {
            adjustTemperature(1);
          }

          if (action === 'mode') {
            setHvacMode(target.dataset.mode);
          }

          if (action === 'toggle') {
            const entityId = target.dataset.entity;
            if (!entityId) return;

            call(entityId.split('.')[0], 'toggle', {
              entity_id: entityId
            });
          }
        });

        const fanSelect = wrapper.querySelector('[data-role="panel-fan-select"]');

        if (fanSelect) {
          fanSelect.addEventListener('change', () => {
            if (!fanSelect.value) return;

            call('climate', 'set_fan_mode', {
              entity_id: ENTITY,
              fan_mode: fanSelect.value
            });
          });
        }

        renderPanel(wrapper);
      };

      $('[data-role="mini-card"]').addEventListener('click', openOverlay);

      root._watchedEntities = [ENTITY, SLEEP, WIND, ECO, ROOM_TEMP, HUMIDITY];

      root._onHassUpdate = () => {
        renderMini();

        if (root.__studyRoomAcFullScreenOverlay && root.__studyRoomAcFullScreenOverlay.isConnected) {
          renderPanel(root.__studyRoomAcFullScreenOverlay);
        }
      };

      renderMini();
    })();
  </script>
