  <script>
    (() => {
      if (root.__studyRoomAcMiniFullScreenPanelInit) return;
      root.__studyRoomAcMiniFullScreenPanelInit = true;

      const ENTITY = 'climate.study_room_ac';
      const SLEEP = 'switch.study_room_ac_sleep_mode';
      const WIND = 'switch.study_room_ac_anti_direct_wind';
      const ECO = 'switch.study_room_ac_eco_mode';
      const ROOM_TEMP = 'sensor.study_room_temperature';
      const HUMIDITY = 'sensor.study_room_humidity';

      const $ = (selector) => root.querySelector(selector);
      const stateOf = (id) => hass.states[id];

      const modeMap = {
        off: { text: '已关闭', icon: 'mdi:power' },
        cool: { text: '制冷中', icon: 'mdi:snowflake' },
        heat: { text: '制热中', icon: 'mdi:fire' },
        dry: { text: '除湿中', icon: 'mdi:water-percent' },
        fan_only: { text: '送风中', icon: 'mdi:fan' },
        auto: { text: '自动', icon: 'mdi:autorenew' },
        heat_cool: { text: '自动', icon: 'mdi:autorenew' },
        unavailable: { text: '离线', icon: 'mdi:alert-circle-outline' },
        unknown: { text: '未知', icon: 'mdi:help-circle-outline' }
      };

      const panelModeText = {
        off: '关闭模式',
        cool: '制冷模式',
        heat: '制热模式',
        dry: '除湿模式',
        fan_only: '送风模式',
        unavailable: '设备不可用',
        unknown: '状态未知'
      };

      const fanLabels = {
        auto: '自动',
        silent: '静音',
        quiet: '静音',
        low: '低速',
        medium: '中速',
        middle: '中速',
        high: '强力',
        turbo: '强力',
        strong: '强力'
      };

      const unavailable = (state) => {
        return !state || state.state === 'unknown' || state.state === 'unavailable';
      };

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      const formatNumber = (value) => {
        const number = Number(value);
        if (!Number.isFinite(number)) return '--';
        return Number.isInteger(number) ? String(number) : number.toFixed(1);
      };

      const formatTemp = (value, unit = false) => {
        const text = formatNumber(value);
        if (text === '--') return '--';
        return unit ? `${text}°C` : text;
      };

      const formatSensor = (id, fallbackUnit = '') => {
        const state = stateOf(id);
        if (unavailable(state)) return '--';

        const unit = state.attributes?.unit_of_measurement || fallbackUnit;
        const number = Number(state.state);

        if (Number.isFinite(number)) {
          const text = Number.isInteger(number) ? String(number) : number.toFixed(1);
          return `${text}${unit}`;
        }

        return `${state.state}${unit}`;
      };

      const call = (domain, service, data) => {
        hass.callService(domain, service, data);
      };

      const normalizeTemperature = (value, step) => {
        const raw = String(step);
        const decimals = raw.includes('.') ? raw.split('.')[1].length : 0;
        return Number(value.toFixed(decimals));
      };

      const canSetTemperature = (state) => {
        const attrs = state?.attributes || {};
        const hvac = state?.state;
        const target = Number(attrs.temperature);
        return ['cool', 'heat'].includes(hvac) && Number.isFinite(target);
      };

      const setHvacMode = (mode) => {
        if (!mode) return;

        call('climate', 'set_hvac_mode', {
          entity_id: ENTITY,
          hvac_mode: mode
        });
      };

      const togglePower = () => {
        const state = stateOf(ENTITY);
        if (!state) return;

        const modes = Array.isArray(state.attributes?.hvac_modes)
          ? state.attributes.hvac_modes
          : [];

        if (state.state !== 'off') {
          setHvacMode('off');
          return;
        }

        if (modes.includes('cool')) {
          setHvacMode('cool');
          return;
        }

        setHvacMode(modes.find((mode) => mode !== 'off') || 'cool');
      };

      const adjustTemperature = (direction) => {
        const state = stateOf(ENTITY);
        if (!canSetTemperature(state)) return;

        const attrs = state.attributes || {};
        const step = Number(attrs.target_temp_step ?? 1) || 1;
        const min = Number(attrs.min_temp ?? 16);
        const max = Number(attrs.max_temp ?? 30);
        const current = Number(attrs.temperature);

        const next = normalizeTemperature(
          clamp(current + direction * step, min, max),
          step
        );

        call('climate', 'set_temperature', {
          entity_id: ENTITY,
          temperature: next,
          hvac_mode: state.state
        });
      };

      const labelFan = (value) => {
        const raw = String(value || '');
        if (!raw) return '--';
        const key = raw.toLowerCase();
        return fanLabels[key] || raw.replaceAll('_', ' ');
      };

      const rebuildFanOptions = (select, modes, currentFan) => {
        const safeModes = Array.isArray(modes) ? modes.slice() : [];

        if (currentFan && !safeModes.includes(currentFan)) {
          safeModes.unshift(currentFan);
        }

        const key = safeModes.join('|');

        if (select.dataset.options === key) return;

        select.dataset.options = key;
        select.replaceChildren();

        if (!safeModes.length) {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = '无可用档位';
          option.disabled = true;
          option.selected = true;
          select.appendChild(option);
          return;
        }

        safeModes.forEach((mode) => {
          const option = document.createElement('option');
          option.value = mode;
          option.textContent = labelFan(mode);
          select.appendChild(option);
        });
      };

      const renderToggle = (scope, entity, selector, textSelector, onText, offText) => {
        const button = scope.querySelector(selector);
        const text = scope.querySelector(textSelector);
        const state = stateOf(entity);
        const value = state?.state || 'unknown';

        if (!button) return;

        button.dataset.state = value;
        button.disabled = value === 'unknown' || value === 'unavailable';

        if (text) {
          text.textContent = value === 'on' ? onText : offText;
        }
      };

      const renderMini = () => {
        const state = stateOf(ENTITY);
        const card = $('[data-role="mini-card"]');
        const modeIcon = $('[data-role="mini-mode-icon"]');
        const modeText = $('[data-role="mini-mode-text"]');
        const nowTemp = $('[data-role="mini-now-temp"]');
        const setTemp = $('[data-role="mini-set-temp"]');
        const room = $('[data-role="mini-room"]');

        if (!card || !modeIcon || !modeText || !nowTemp || !setTemp) return;

        const mode = state?.state || 'unknown';
        const attrs = state?.attributes || {};
        const info = modeMap[mode] || modeMap.unknown;

        card.dataset.mode = mode;
        modeIcon.setAttribute('icon', info.icon);
        modeText.textContent = info.text;

        if (room) {
          room.textContent = attrs.friendly_name
            ? attrs.friendly_name.replace('空调', '').trim() || attrs.friendly_name
            : '房间';
        }

        nowTemp.textContent = formatNumber(stateOf(ROOM_TEMP)?.state ?? attrs.current_temperature);
        setTemp.textContent = formatNumber(attrs.temperature);
      };

      const renderPanel = (wrapper) => {
        if (!wrapper || !wrapper.isConnected) return;

        const q = (selector) => wrapper.querySelector(selector);
        const qa = (selector) => Array.from(wrapper.querySelectorAll(selector));

        const state = stateOf(ENTITY);
        const attrs = state?.attributes || {};
        const hvac = state?.state || 'unknown';
        const card = q('[data-role="panel-card"]');

        if (!card) return;

        const modes = Array.isArray(attrs.hvac_modes) ? attrs.hvac_modes : [];
        const fanModes = Array.isArray(attrs.fan_modes) ? attrs.fan_modes : [];
        const currentFan = attrs.fan_mode || '';
        const active = hvac !== 'off' && hvac !== 'unknown' && hvac !== 'unavailable';

        card.dataset.hvac = hvac;

        q('[data-role="panel-title"]').textContent = attrs.friendly_name || '空调';
        q('[data-role="panel-state-text"]').textContent = `${modeMap[hvac]?.text || hvac} · ${hvac === 'unavailable' ? '离线' : '在线'}`;
        q('[data-role="panel-target-temp"]').textContent = formatTemp(attrs.temperature);
        q('[data-role="panel-mode-text"]').textContent = panelModeText[hvac] || hvac || '状态未知';
        q('[data-role="panel-room-temp-text"]').textContent = `室内温度 ${formatSensor(ROOM_TEMP, '°C')}`;
        q('[data-role="panel-humidity-text"]').textContent = `室内湿度 ${formatSensor(HUMIDITY, '%')}`;

        const power = q('[data-action="power"]');

        if (power) {
          power.dataset.on = active ? 'true' : 'false';
          power.disabled = hvac === 'unknown' || hvac === 'unavailable';
        }

        qa('[data-action="temp-down"], [data-action="temp-up"]').forEach((button) => {
          button.disabled = !canSetTemperature(state);
        });

        qa('[data-action="mode"]').forEach((button) => {
          const mode = button.dataset.mode;
          const supported = !modes.length || modes.includes(mode);

          button.classList.toggle('is-active', hvac === mode);
          button.disabled = !supported || hvac === 'unknown' || hvac === 'unavailable';
        });

        const fanSelect = q('[data-role="panel-fan-select"]');

        if (fanSelect) {
          rebuildFanOptions(fanSelect, fanModes, currentFan);

          if (currentFan) {
            fanSelect.value = currentFan;
          }

          fanSelect.disabled = !fanModes.length || hvac === 'unknown' || hvac === 'unavailable';
        }

        renderToggle(wrapper, WIND, '[data-entity="' + WIND + '"]', '[data-role="panel-wind-text"]', '已开启', '防直吹');
        renderToggle(wrapper, SLEEP, '[data-entity="' + SLEEP + '"]', '[data-role="panel-sleep-text"]', '已开启', '未开启');
        renderToggle(wrapper, ECO, '[data-entity="' + ECO + '"]', '[data-role="panel-eco-text"]', '已开启', '未开启');
      };

      const closeOverlay = () => {
        const wrapper = root.__studyRoomAcFullScreenOverlay;
        if (!wrapper) return;

        wrapper.classList.add('is-closing');

        window.setTimeout(() => {
          wrapper.remove();
          root.__studyRoomAcFullScreenOverlay = null;
        }, 180);
      };

      const openOverlay = () => {
        if (root.__studyRoomAcFullScreenOverlay && root.__studyRoomAcFullScreenOverlay.isConnected) {
          root.__studyRoomAcFullScreenOverlay.remove();
          root.__studyRoomAcFullScreenOverlay = null;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'ac-control-overlay';

        wrapper.innerHTML = `
          <style>
            .ac-control-overlay,
            .ac-control-overlay * {
              box-sizing: border-box;
            }

            .ac-control-overlay {
              position: fixed;
              inset: 0;
              z-index: 99999;
              pointer-events: auto;
              color: var(--primary-text-color);
              font: inherit;
              opacity: 1;
              background: #edf6ff;
              transition: opacity 0.18s ease;
            }

            .ac-control-overlay.is-closing {
              opacity: 0;
            }

            .ac-full-page {
              position: absolute;
              inset: 0;
              width: 100vw;
              height: 100vh;
              height: 100dvh;
              overflow: auto;
              background: #edf6ff;
            }

            .ac-panel,
            .ac-panel * {
              box-sizing: border-box;
            }

            .ac-panel {
              --mode-color: #2f7df6;
              --mode-soft: rgba(47, 125, 246, 0.12);
              --mode-mid: rgba(47, 125, 246, 0.22);
              --text-main: #17243a;
              --text-sub: #7d8fa8;
              --card-shadow: 0 14px 32px rgba(48, 83, 132, 0.15);

              width: 100%;
              min-height: 100vh;
              min-height: 100dvh;
              padding: calc(22px + env(safe-area-inset-top)) 22px calc(24px + env(safe-area-inset-bottom));
              margin: 0;
              border-radius: 10px;
              overflow: hidden;
              color: var(--text-main);
              font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
              background:
                radial-gradient(circle at 50% 21%, var(--mode-soft), transparent 35%),
                linear-gradient(180deg, #f7fbff 0%, #edf6ff 100%);
            }

            .ac-panel[data-hvac="cool"] {
              --mode-color: #2f7df6;
              --mode-soft: rgba(47, 125, 246, 0.13);
              --mode-mid: rgba(47, 125, 246, 0.23);
            }

            .ac-panel[data-hvac="heat"] {
              --mode-color: #ff8a2a;
              --mode-soft: rgba(255, 138, 42, 0.14);
              --mode-mid: rgba(255, 138, 42, 0.24);
            }

            .ac-panel[data-hvac="dry"] {
              --mode-color: #20b86a;
              --mode-soft: rgba(32, 184, 106, 0.13);
              --mode-mid: rgba(32, 184, 106, 0.22);
            }

            .ac-panel[data-hvac="fan_only"] {
              --mode-color: #20a8d8;
              --mode-soft: rgba(32, 168, 216, 0.13);
              --mode-mid: rgba(32, 168, 216, 0.23);
            }

            .ac-panel[data-hvac="off"],
            .ac-panel[data-hvac="unknown"],
            .ac-panel[data-hvac="unavailable"] {
              --mode-color: #94a3b8;
              --mode-soft: rgba(148, 163, 184, 0.13);
              --mode-mid: rgba(148, 163, 184, 0.22);
            }

            .ac-header {
              display: grid;
              grid-template-columns: minmax(0, 1fr) auto;
              gap: 12px;
              align-items: start;
            }

            .title-block {
              min-width: 0;
              display: grid;
              gap: 8px;
            }

            .room-title {
              font-size: 20px;
              line-height: 1.05;
              font-weight: 800;
              letter-spacing: -0.04em;
              color: #263751;
              white-space: nowrap;
              overflow: hidden;
              text-overflow: ellipsis;
            }

            .status-row {
              display: flex;
              align-items: center;
              gap: 7px;
              min-width: 0;
              color: var(--text-sub);
              font-size: 12px;
