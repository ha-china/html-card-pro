  <style>
  :host { display: block; width: 100%; }
  .washer-wrap {
    position: relative; width: 100%; aspect-ratio: 3 / 4; max-height: 520px;
    display: flex; align-items: center; justify-content: center; padding: 12px;
  }
  svg.washer-svg { width: 100%; height: 100%; overflow: visible; }
  @keyframes drumSpin { from{transform:rotate(0)}to{transform:rotate(360deg)} }
  .drum-spin-group { transform-origin: 150px 260px; }
  .washer-active .drum-spin-group { animation: drumSpin 3s linear infinite; }
  @keyframes waterRise { 0%{transform:translateY(30px);opacity:0}40%{opacity:.35}100%{transform:translateY(0);opacity:.25} }
  .water-fill { opacity:0; }
  .washer-active .water-fill { animation: waterRise 2s ease-out forwards; }
  @keyframes ledBlink { 0%,100%{opacity:1}50%{opacity:.6} }
  .led-dot { animation: ledBlink 1.5s ease-in-out infinite; }
  @keyframes panelSweep { 0%{opacity:.06;transform:translateX(-100%)}50%{opacity:.14}100%{opacity:.06;transform:translateX(100%)} }
  .panel-highlight { animation: panelSweep 4s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{opacity:.15}50%{opacity:.35} }
  .glass-shimmer { animation: shimmer 3s ease-in-out infinite; }
  .door-glow { opacity:0; transition: opacity .8s; }
  .washer-active .door-glow { opacity:1; }
  .btn-rect { cursor:pointer; transition: all .12s; }
  .btn-rect:hover rect.btn-bg { fill: rgba(255,255,255,.13); }
  .btn-rect:active rect.btn-bg { fill: rgba(255,255,255,.25); }
  .btn-rect.active-btn rect.btn-bg { fill: rgba(100,180,255,.25); }
  .btn-rect.active-btn text.btn-label { fill: #88ccff; }
  @keyframes statusFlash { 0%{opacity:1}50%{opacity:.3}100%{opacity:1} }
  .status-flash { animation: statusFlash .4s ease; }
  </style>

