  <script>
  if (root._washerInitV8) return;
  root._washerInitV8 = true;

  var COUNTER_ENTITY = 'counter.xi_yi_dai_ji_ji_shu_qi';

  root._watchedEntities = [
    'switch.cuco_cn_945184375_v3_on_p_2_1',
    'input_boolean.xi_yi_ji_bo_bao_kai_guan',
    COUNTER_ENTITY,
    'sensor.hai_er_xi_yi_ji_zhuang_tai'
  ];

  var _lastVals = {};

  function _flash(el, val, key) {
    if (!el) return;
    if (_lastVals[key] !== undefined && _lastVals[key] !== val) {
      el.classList.remove('status-flash');
      void el.offsetWidth;
      el.classList.add('status-flash');
    }
    _lastVals[key] = val;
  }

  function _upd() {
    var sw = hass.states['switch.cuco_cn_945184375_v3_on_p_2_1'];
    var bc = hass.states['input_boolean.xi_yi_ji_bo_bao_kai_guan'];
    var ct = hass.states[COUNTER_ENTITY];
    var sr = hass.states['sensor.hai_er_xi_yi_ji_zhuang_tai'];

    var stEl = root.querySelector('#sTxt');
    var stVal = sr ? sr.state : '--';
    if (stEl) {
      _flash(stEl, stVal, 's');
      stEl.textContent = stVal;
      stEl.setAttribute('fill', (sw && sw.state === 'on') ? '#00ff88' : '#ff8800');
    }
    var pIco = root.querySelector('#pIco');
    if (pIco) {
      var isOn = sw && sw.state === 'on';
      pIco.querySelectorAll('circle,line').forEach(function(e) {
        e.setAttribute('stroke', isOn ? '#00ff88' : '#ff8800');
      });
    }

    var bcT = root.querySelector('#bcTxt');
    var bcI = root.querySelector('#bcIco');
    var bcOn = bc && bc.state === 'on';
    if (bcT) {
      _flash(bcT, bcOn ? '1' : '0', 'bc');
      bcT.textContent = bcOn ? '开' : '关';
      bcT.setAttribute('fill', bcOn ? '#4fc3f7' : 'rgba(200,200,200,.4)');
    }
    if (bcI) {
      bcI.querySelectorAll('polygon,path').forEach(function(e) {
        e.setAttribute('fill', bcOn ? '#4fc3f7' : 'rgba(200,200,200,.3)');
        e.setAttribute('stroke', bcOn ? '#4fc3f7' : 'rgba(200,200,200,.3)');
      });
    }

    var ctEl = root.querySelector('#ctTxt');
    var ctVal = ct ? ct.state : '0';
    if (ctEl) {
      _flash(ctEl, ctVal, 'ct');
      ctEl.textContent = ctVal;
    }

    var wrap = root.querySelector('.washer-wrap');
    if (wrap) wrap.classList.toggle('washer-active', sw && sw.state === 'on');

    root.querySelectorAll('.btn-rect[data-entity]').forEach(function(btn) {
      var eid = btn.getAttribute('data-entity');
      var st = hass.states[eid];
      if (st) btn.classList.toggle('active-btn', st.state === 'on');
    });
  }

  root._onHassUpdate = _upd;

  root.querySelectorAll('.btn-rect').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var ca = btn.getAttribute('data-counter-action');
      if (ca) {
        hass.callService('counter', ca, { entity_id: COUNTER_ENTITY });
        _animBtn(btn);
        return;
      }
      var eid = btn.getAttribute('data-entity');
      if (eid) {
        hass.callService('homeassistant', 'toggle', { entity_id: eid });
        _animBtn(btn);
      }
    });
  });

  function _animBtn(btn) {
    if (window.anime) {
      var bg = btn.querySelector('.btn-bg');
      if (bg) anime({ targets: bg, scale: [0.88, 1], duration: 200, easing: 'easeOutCubic' });
    }
  }

  if (window.anime) {
    anime({ targets: root.querySelector('.washer-svg'), opacity: [0,1], scale: [0.95,1], duration: 800, easing: 'easeOutCubic' });
  }

  _upd();
  </script>
