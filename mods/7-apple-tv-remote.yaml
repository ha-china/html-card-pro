# Apple TV Remote
# Author: knoop7
# Version: 1.0
# Description: This module provides an Apple TV Remote for HTML Pro Card. With exquisite UI design and GSAP physics animations, it delivers the ultimate remote control experience.
# Tags: Appliance
# Image: https://cdn.jsdelivr.net/gh/ha-china/html-card-pro@main/images/7.png
