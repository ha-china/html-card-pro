type: custom:html-pro-card
do_not_parse: true
content: |
  <style>
   .cp{height:100vh;display:flex;flex-direction:column;background:var(--primary-background-color);font-family:var(--primary-font-family);overflow:hidden}
   .top{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--card-background-color);border-bottom:1px solid var(--divider-color)}
   .brand{display:flex;align-items:center;gap:14px}
   .brand-ic{width:42px;height:42px;display:flex;align-items:center;justify-content:center}
   .brand-ic ha-icon{--mdc-icon-size:22px;color:var(--primary-color)}
   .brand h1{margin:0;font-size:1.5rem;font-weight:700;color:var(--primary-text-color)}
   .brand p{margin:0;font-size:.9rem;color:var(--secondary-text-color)}
   .si{display:flex;align-items:center;gap:10px}
   .si-dot{width:10px;height:10px;border-radius:50%;animation:pulse 2s infinite}
   .si-on{background:#4CAF50}.si-off{background:var(--secondary-text-color)}
   @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
   .si-txt{font-size:.9rem;font-weight:500}
   .main{flex:1;display:flex;overflow-y:auto}
   .side{width:250px;flex-shrink:0;background:var(--secondary-background-color);border-right:1px solid var(--divider-color);display:flex;flex-direction:column}
   .side-sec{padding:16px;border-bottom:1px solid var(--divider-color)}
   .side-t{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--secondary-text-color);margin-bottom:10px}
   .sb{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;margin-bottom:6px}
   .sb:last-child{margin-bottom:0}
   .sb-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
   .sb-ic.blue{background:rgba(33,150,243,.15);color:#2196F3}
   .sb-ic.green{background:rgba(76,175,80,.15);color:#4CAF50}
   .sb-ic.orange{background:rgba(255,152,0,.15);color:#FF9800}
   .sb-ic.purple{background:rgba(156,39,176,.15);color:#9C27B0}
   .sb-ic.teal{background:rgba(38,166,154,.15);color:#26A69A}
   .sb-ic ha-icon{--mdc-icon-size:18px}
   .sb-info{flex:1;min-width:0}
   .sb-val{font-size:1.1rem;font-weight:700;color:var(--primary-text-color);overflow-wrap:break-word;word-break:break-word}
   .sb-lbl{font-size:.78rem;color:var(--secondary-text-color)}
   .qa{display:flex;flex-direction:column;gap:6px}
   .qb{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;border:1px solid var(--divider-color);background:var(--primary-background-color);color:var(--primary-text-color);cursor:pointer;transition:all .15s;font-size:.85rem;font-weight:500;text-align:left;font-family:inherit}
   .qb:hover{border-color:var(--primary-color);background:rgba(var(--rgb-primary-color),.05);transform:translateX(3px)}
   .qb ha-icon{--mdc-icon-size:18px;color:var(--primary-color)}
   .cnt{flex:1;display:flex;flex-direction:column;padding:16px;gap:14px}
   .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
   .cd{background:var(--card-background-color);border-radius: 10px;border:1px solid var(--divider-color);overflow:hidden;display:flex;flex-direction:column}
   .cd.c-blue{border-top:3px solid #5B9BD5}.cd.c-blue .ch{background:linear-gradient(135deg,transparent,rgba(91,155,213,.08))}
   .cd.c-green{border-top:3px solid #4CAF50}.cd.c-green .ch{background:linear-gradient(135deg,transparent,rgba(76,175,80,.08))}
   .cd.c-purple{border-top:3px solid #AB47BC}.cd.c-purple .ch{background:linear-gradient(135deg,transparent,rgba(171,71,188,.08))}
   .cd.c-orange{border-top:3px solid #FF9800}.cd.c-orange .ch{background:linear-gradient(135deg,transparent,rgba(255,152,0,.08))}
   .cd.c-teal{border-top:3px solid #26A69A}.cd.c-teal .ch{background:linear-gradient(135deg,transparent,rgba(38,166,154,.08))}
   .cd.c-red{border-top:3px solid #EF5350}.cd.c-red .ch{background:linear-gradient(135deg,transparent,rgba(239,83,80,.08))}
   .cd.c-indigo{border-top:3px solid #5C6BC0}.cd.c-indigo .ch{background:linear-gradient(135deg,transparent,rgba(92,107,192,.08))}
   .cd.c-amber{border-top:3px solid #FFB300}.cd.c-amber .ch{background:linear-gradient(135deg,transparent,rgba(255,179,0,.08))}
   .cd.c-cyan{border-top:3px solid #00BCD4}.cd.c-cyan .ch{background:linear-gradient(135deg,transparent,rgba(0,188,212,.08))}
   .ch{padding:12px 16px;border-bottom:1px solid var(--divider-color);display:flex;align-items:center;gap:8px}
   .ch ha-icon{--mdc-icon-size:16px;color:var(--primary-color)}
   .ch span{font-size:.92rem;font-weight:600;color:var(--primary-text-color)}
   .cb{padding:10px 14px;flex:1}
   .ar{padding:7px 0}.ar+.ar{border-top:1px solid var(--divider-color)}
   .al{font-size:.82rem;font-weight:600;color:var(--primary-text-color);display:flex;align-items:center;gap:5px;margin-bottom:2px}
   .al ha-icon{--mdc-icon-size:14px;color:var(--primary-color)}
   .ad{font-size:.72rem;color:var(--secondary-text-color);margin-bottom:3px}
   .sel{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--divider-color);background:var(--primary-background-color);color:var(--primary-text-color);font-size:.82rem;cursor:pointer;font-family:inherit;-webkit-appearance:none;appearance:none}
   .sel:focus{outline:none;border-color:var(--primary-color)}
   .tg{position:relative;width:36px;height:20px;cursor:pointer;display:inline-block;flex-shrink:0}
   .tg input{opacity:0;width:0;height:0;position:absolute}
   .tg-sl{position:absolute;inset:0;background:var(--divider-color);border-radius:10px;transition:background .25s}
   @media(prefers-color-scheme:dark){.tg-sl{background:#3a3a3c}}
   .tg input:checked+.tg-sl{background:var(--primary-color);opacity:.85}
   .tg-sl:before{position:absolute;content:'';height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 2px rgba(0,0,0,.15)}
   .tg input:checked+.tg-sl:before{transform:translateX(16px)}
   .tr{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;background:var(--secondary-background-color);margin-bottom:4px;gap:8px}
   .tr:last-child{margin-bottom:0}
   .tr-info{flex:1;min-width:0}
   .tr-nm{font-size:.76rem;font-weight:500;display:flex;align-items:center;gap:5px;color:var(--primary-text-color)}
   .tr-nm ha-icon{--mdc-icon-size:14px;color:var(--primary-color)}
   .tr-ds{font-size:.62rem;color:var(--secondary-text-color)}
   .mb{display:flex;gap:3px;flex-wrap:wrap}
   .mbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--divider-color);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:var(--primary-text-color);font-family:inherit}
   .mbtn.on{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}
   .mbtn:hover:not(.on){border-color:var(--primary-color)}
   .tg2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
   .sld{margin-bottom:8px}.sld:last-child{margin-bottom:0}
   .sld-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
   .sld-lbl{font-size:.78rem;font-weight:500;color:var(--primary-text-color)}
   .sld-val{font-size:.85rem;font-weight:700;color:var(--primary-color)}
   input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--divider-color);outline:none}
   input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary-color);cursor:pointer}
   .bot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--card-background-color);border-top:1px solid var(--divider-color)}
   .fi{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
   .fi-item{display:flex;align-items:center;gap:4px;font-size:.8rem;color:var(--secondary-text-color)}
   .fi-item ha-icon{--mdc-icon-size:14px}
   .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:10px;font-size:.82rem;font-weight:500;z-index:1000;transition:opacity .3s;pointer-events:none;background:rgba(var(--rgb-primary-color),.9);color:var(--card-background-color,var(--primary-background-color))}
   .res-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.72rem;color:var(--primary-text-color);cursor:pointer;transition:background .15s}
   .res-item:hover{background:rgba(var(--rgb-primary-color),.1)}
   .res-item ha-icon{--mdc-icon-size:14px;color:var(--primary-color);flex-shrink:0}
   .res-item .res-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
   .res-item .res-sz{font-size:.65rem;color:var(--secondary-text-color);flex-shrink:0}
   .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center}
   .modal{background:var(--card-background-color);border-radius: 10px;width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.3)}
   .modal-head{padding:12px 16px;border-bottom:1px solid var(--divider-color);display:flex;align-items:center;justify-content:space-between}
   .modal-head span{font-size:.92rem;font-weight:600;color:var(--primary-text-color)}
   .modal-close{background:none;border:none;color:var(--secondary-text-color);cursor:pointer;font-size:1.2rem;padding:0}
   .modal-body{padding:12px 16px;flex:1;overflow-y:auto}
   .modal-foot{padding:10px 16px;border-top:1px solid var(--divider-color);display:flex;justify-content:flex-end;gap:8px}
   .file-editor{width:100%;min-height:120px;padding:8px;border-radius:6px;border:1px solid var(--divider-color);background:var(--primary-background-color);color:var(--primary-text-color);font-family:monospace;font-size:.75rem;resize:vertical}
   .file-editor:focus{outline:none;border-color:var(--primary-color)}
   .btn-sm{padding:4px 12px;border-radius:6px;border:1px solid var(--divider-color);background:var(--primary-background-color);color:var(--primary-text-color);font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
   .btn-sm:hover{border-color:var(--primary-color);background:rgba(var(--rgb-primary-color),.05)}
   .btn-sm.primary{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}
   /* ── Mobile: hide HA system header & sidebar ── */
   @media(max-width:768px){
   home-assistant home-assistant-main ha-drawer > ha-top-app-bar-fixed,
   home-assistant home-assistant-main ha-drawer app-header{display:none!important}
   home-assistant home-assistant-main ha-drawer .mdc-drawer-app-content{padding-left:0!important;padding-inline-start:0!important}
   .cp{height:100dvh!important}
   }
  
   @media(max-width:1200px){.side{width:200px}.cols{grid-template-columns:1fr 1fr}}
   @media(max-width:768px){.det{margin-bottom:6px}.det summary{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--primary-text-color);background:var(--secondary-background-color);transition:background .15s;list-style:none;user-select:none}.det summary::-webkit-details-marker{display:none}.det summary:hover{background:rgba(var(--rgb-primary-color),.1)}.det summary ha-icon{--mdc-icon-size:16px;color:var(--primary-color)}.det summary .det-cnt{flex:1}.det summary .det-bg{font-size:.7rem;color:var(--secondary-text-color);background:rgba(var(--rgb-primary-color),.1);padding:1px 8px;border-radius:10px}.det[open] summary{margin-bottom:6px;border-bottom:1px solid var(--divider-color)}.det .det-body{padding:2px 0}.top{padding:12px 14px}.brand-ic{width:32px;height:32px}.brand h1{font-size:1rem}.brand p{display:none}.main{flex-direction:column}.side{width:100%;border-right:none;border-bottom:1px solid var(--divider-color);flex-direction:column}.side-sec{padding:10px 12px}.qa{flex-direction:row;flex-wrap:wrap;gap:5px}.qb{flex-shrink:0;padding:7px 10px;font-size:.75rem}.cnt{padding:10px;gap:10px}.cols{grid-template-columns:1fr}.bot{flex-direction:column;gap:8px;padding:10px 14px}.modal{width:95%}}
  </style>
  
  <div class="cp">
   <div class="top">
   <div class="brand">
   <div class="brand-ic"><img src="/local/claw_icon.png" style="width:24px;height:24px;object-fit:contain"></div>
   <div><h1>Claw Assistant</h1><p>智能助手控制面板</p></div>
   </div>
   <div class="si">
   <div class="si-dot si-off" id="sDot"></div>
   <span class="si-txt" id="sTxt">连接中</span>
   <button class="qb" data-action="refresh-sensor" style="margin-left:8px;padding:4px 8px;font-size:.7rem"><ha-icon icon="mdi:refresh"></ha-icon><span>刷新</span></button>
   </div>
   </div>
   <div class="main">
   <div class="side">
   <div class="side-sec">
   <div class="side-t">状态概览</div>
   <div class="sb"><div class="sb-ic blue"><ha-icon icon="mdi:brain"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svPa">-</div><div class="sb-lbl">主力智能体</div></div></div>
   <div class="sb"><div class="sb-ic purple"><ha-icon icon="mdi:swap-horizontal"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svFa">-</div><div class="sb-lbl">备用智能体</div></div></div>
   <div class="sb"><div class="sb-ic green"><ha-icon icon="mdi:toggle-switch-outline"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svOn">-</div><div class="sb-lbl">已启用功能</div></div></div>
   </div>
   <div class="side-sec">
   <div class="side-t">资源概览</div>
   <div class="sb"><div class="sb-ic teal"><ha-icon icon="mdi:lightning-bolt"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svSkill">-</div><div class="sb-lbl">已安装技能</div></div></div>
   <div class="sb"><div class="sb-ic orange"><ha-icon icon="mdi:file-document-outline"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svDoc">-</div><div class="sb-lbl">工作区文档</div></div></div>
   <div class="sb"><div class="sb-ic purple"><ha-icon icon="mdi:puzzle"></ha-icon></div><div class="sb-info"><div class="sb-val" id="svPlug">-</div><div class="sb-lbl">已安装插件</div></div></div>
   </div>
   <div class="side-sec">
   <div class="side-t">快捷操作</div>
   <div class="qa">
   <button class="qb" data-action="reload"><ha-icon icon="mdi:refresh"></ha-icon><span>重载对话</span></button>
   </div>
   </div>
   </div>
   <div class="cnt" id="body"></div>
   </div>
   <div class="bot">
   <div class="fi">
   <div class="fi-item"><ha-icon icon="mdi:information"></ha-icon><span>Claw Dashboard v1.0</span></div>
   <div class="fi-item"><ha-icon icon="mdi:clock"></ha-icon><span id="btTime">-</span></div>
   <div class="fi-item"><ha-icon icon="mdi:lightning-bolt"></ha-icon><span id="btRes">-</span></div>
   </div>
   </div>
  </div>
  <div id="toast" class="toast" style="opacity:0"></div>
  <div id="modal" style="display:none"></div>
  
  <script>
   if(root._init) return; root._init=true;
   root._watchedEntities=['sensor.claw_dashboard_config_claw_config','conversation.claw_assistant'];
   var _sid=null, _pr=false;
  
   function b(v){return v===true||v==='true'||v===1||v==='1'}
   function findS(){if(_sid&&hass.states[_sid])return _sid;var k=Object.keys(hass.states);for(var i=0;i<k.length;i++){if(k[i].startsWith('sensor.')&&k[i].indexOf('claw_config')!==-1){_sid=k[i];return _sid}}return null}
   function agName(eid){if(!eid)return'未设置';var s=hass.states[eid];return(s&&s.attributes&&s.attributes.friendly_name)||eid.replace('conversation.','')}
   function agList(sel){var list=Object.keys(hass.states).filter(function(e){return e.startsWith('conversation.')&&e!=='conversation.home_assistant'});var h='<option value="">(自动)</option>';list.forEach(function(a){var n=(hass.states[a]&&hass.states[a].attributes&&hass.states[a].attributes.friendly_name)||a.split('.')[1];h+='<option value="'+a+'"'+(sel===a?' selected':'')+'>'+n+'</option>'});return h}
  
   function setOpt(k,v){
   hass.callService('claw_plus','set_option',{key:k,value:v});
   if(!_pr){_pr=true;setTimeout(function(){hass.callService('homeassistant','update_entity',{entity_id:_sid||'sensor.claw_dashboard_config_claw_config'});_pr=false},1500)}
   var t=$('#toast');if(t){t.textContent=k+' = '+v;t.style.opacity='1';setTimeout(function(){t.style.opacity='0'},2000)}
   }
  
   function tgHtml(key,name,desc,icon,checked){
   return '<div class="tr"><div class="tr-info"><div class="tr-nm"><ha-icon icon="'+icon+'"></ha-icon>'+name+'</div>'+(desc?'<div class="tr-ds">'+desc+'</div>':'')+'</div><label class="tg"><input type="checkbox"'+(checked?' checked':'')+' data-claw-key="'+key+'"><span class="tg-sl"></span></label></div>';
   }
  
   function fmtSize(bytes){if(!bytes)return'0B';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB'}
  
   // ── Read file via service (with response) ──
   function readFile(path,cb){
   hass.callWS({type:'call_service',domain:'claw_plus',service:'read_workspace_file',service_data:{path:path},return_response:true}).then(function(r){cb(r.response||null)}).catch(function(e){console.warn('readFile:',e);cb(null)});
   }
   function writeFile(path,content,cb){
   hass.callWS({type:'call_service',domain:'claw_plus',service:'write_workspace_file',service_data:{path:path,content:content},return_response:true}).then(function(r){cb(true)}).catch(function(e){console.warn('writeFile:',e);cb(false)});
   }
  
   // ── Modal ──
   function openModal(title,bodyHtml,footHtml){var m=$('#modal');if(m){m.style.display='';m.innerHTML='<div class="modal-bg"><div class="modal"><div class="modal-head"><span>'+title+'</span><button class="modal-close" data-action="close-modal">&times;</button></div><div class="modal-body">'+bodyHtml+'</div>'+(footHtml?'<div class="modal-foot">'+footHtml+'</div>':'')+'</div></div>'}}
   function closeModal(){var m=$('#modal');if(m){m.style.display='none';m.innerHTML=''}}
  
   function openFileEditor(filePath,fileName){
   readFile(filePath,function(resp){
   var content=resp?resp.content||'':'(读取失败)';
   var safe=content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
   openModal('<ha-icon icon="mdi:file-edit"></ha-icon> '+fileName,
   '<textarea class="file-editor" id="fileContent">'+safe+'</textarea>',
   '<button class="btn-sm" data-action="close-modal">取消</button><button class="btn-sm primary" data-action="save-file" data-file-path="'+filePath+'">保存</button>');
   });
   }
  
   function saveFile(filePath){
   var ta=$('#fileContent');var content=ta?ta.value:'';
   writeFile(filePath,content,function(ok){
   closeModal();
   var t=$('#toast');if(t){t.textContent=ok?'已保存: '+filePath:'保存失败';t.style.opacity='1';setTimeout(function(){t.style.opacity='0'},2000)}
   });
   }
  
   // ── Build ──
   function build(o){
   var cm=o.conversation_mode||'add_name';
   var skills=o.skills||[],docs=o.docs||[],plugins=o.plugins||[];
   var h='<div class="cols">';
  
   // ── Row 1: AI / 对话 / 通知 ──
   h+='<div class="cd c-blue"><div class="ch"><ha-icon icon="mdi:brain"></ha-icon><span>AI 智能体</span></div><div class="cb">';
   h+='<div class="ar"><div class="al"><ha-icon icon="mdi:star"></ha-icon>主力智能体</div><select class="sel" data-claw-key="primary_agent">'+agList(o.primary_agent)+'</select></div>';
   h+='<div class="ar"><div class="al"><ha-icon icon="mdi:swap-horizontal"></ha-icon>备用智能体</div><select class="sel" data-claw-key="fallback_agent">'+agList(o.fallback_agent)+'</select></div>';
   h+='<div class="ar"><div class="al"><ha-icon icon="mdi:source-branch"></ha-icon>二级备用智能体</div><select class="sel" data-claw-key="secondary_fallback_agent">'+agList(o.secondary_fallback_agent)+'</select></div>';
   h+='</div></div>';
  
   h+='<div class="cd c-indigo"><div class="ch"><ha-icon icon="mdi:cog"></ha-icon><span>对话设置</span></div><div class="cb">';
   h+='<div class="ar"><div class="al"><ha-icon icon="mdi:format-text"></ha-icon>对话模式</div><div class="mb">';
   [['no_name','简单'],['add_name','带名字'],['detailed','详细']].forEach(function(m){h+='<button class="mbtn'+(cm===m[0]?' on':'')+'" data-claw-mode="'+m[0]+'">'+m[1]+'</button>'});
   h+='</div></div>';
   h+=tgHtml('continuous_conversation','持续对话','保持上下文连续性','mdi:repeat',b(o.continuous_conversation));
