   root.addEventListener('click',function(e){
   var refreshBtn=e.target.closest('[data-action="refresh-sensor"]');
   if(refreshBtn){
   hass.callService('claw_plus','refresh_sensor',{}).then(function(){
   var t=$('#toast');if(t){t.textContent='配置已刷新';t.style.opacity='1';setTimeout(function(){t.style.opacity='0'},2000)}
   }).catch(function(err){
   var t=$('#toast');if(t){t.textContent='刷新失败: '+err;t.style.opacity='1';setTimeout(function(){t.style.opacity='0'},3000)}
   });
   return;
   }
   var mb=e.target.closest('[data-claw-mode]');
   if(mb){var m=mb.getAttribute('data-claw-mode');var bar=mb.parentElement;var bs=bar.querySelectorAll('.mbtn');for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');mb.classList.add('on');setOpt('conversation_mode',m);return}
   var qb=e.target.closest('[data-action]');
   if(qb){var a=qb.getAttribute('data-action');
   if(a==='reload')hass.callService('conversation','reload',{});
   else if(a==='view-status')hass.callService('homeassistant','update_entity',{entity_id:_sid||'sensor.claw_dashboard_config_claw_config'});
   else if(a==='close-modal')closeModal();
   else if(a==='save-file')saveFile(qb.getAttribute('data-file-path'));
   else if(a==='edit-file')openFileEditor(qb.getAttribute('data-file-path'),qb.getAttribute('data-file-name'));
   else if(a==='view-file')openFileEditor(qb.getAttribute('data-file-path'),qb.getAttribute('data-file-name'));
   return;
   }
   });
   root.addEventListener('change',function(e){
   var el=e.target;
   var fs=el.getAttribute('data-file-select');if(fs==='true'&&el.value){openFileEditor(el.value,el.options[el.selectedIndex].text);return;}
   var key=el.getAttribute('data-claw-key');if(!key)return;
   if(el.tagName==='SELECT')setOpt(key,el.value);
   else if(el.tagName==='INPUT'&&el.type==='checkbox')setOpt(key,el.checked);
   else if(el.tagName==='INPUT'&&el.type==='range'){var v=parseInt(el.value);if(key==='pipeline_timeout')v=v*60;var lbl=document.getElementById('v_'+key);if(lbl)lbl.textContent=el.value;setOpt(key,v)}
   });
   root.addEventListener('input',function(e){var el=e.target,key=el.getAttribute('data-claw-key');if(!key||el.type!=='range')return;var lbl=document.getElementById('v_'+key);if(lbl)lbl.textContent=el.value});
  
  
  
