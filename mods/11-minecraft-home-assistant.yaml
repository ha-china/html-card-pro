    </div><script>
    if(!root.__mcDashboardInitV2){
      root.__mcDashboardInitV2=true;
      const navTo = (path) => {
        if(window.claw && claw.navigate) claw.navigate(path);
        else window.history.pushState(null,'',path);
      };
      $$('.nav-target').forEach(btn=>btn.addEventListener('click',()=>{
        $$('.nav-target').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const key=btn.dataset.nav;
        if(key==='home') $('.welcome')?.scrollIntoView({behavior:'smooth',block:'nearest'});
        if(key==='devices') $('.devices')?.scrollIntoView({behavior:'smooth',block:'nearest'});
        if(key==='rooms') $('.rooms')?.scrollIntoView({behavior:'smooth',block:'nearest'});
        if(key==='energy') $('.bars')?.scrollIntoView({behavior:'smooth',block:'nearest'});
        if(key==='scenes') $('.scene-grid')?.scrollIntoView({behavior:'smooth',block:'nearest'});
        if(key==='automations') navTo('/config/automation/dashboard');
        if(key==='logs') navTo('/config/logs');
        if(key==='settings') navTo('/config/dashboard');
      }));
      $('#weather-action')?.addEventListener('click',()=>{
        if(window.claw && claw.moreInfo) claw.moreInfo('weather.home');
        else if(window.claw && claw.fire) claw.fire('hass-more-info',{entityId:'weather.home'});
      });
      $$('.scene').forEach(btn=>btn.addEventListener('click',()=>{
        const entity=btn.dataset.sceneEntity;
        const name=btn.dataset.sceneName || btn.textContent.trim() || entity;
        if(!entity) return;
        if(window.confirm && !window.confirm('确认执行场景：' + name + '？')) return;
        hass.callService('scene','turn_on',{entity_id:entity});
      }));
    }
    const val=(id,f='--')=>hass.states[id]?.state??f;
    const attr=(id,k,f='')=>hass.states[id]?.attributes?.[k]??f;
    const num=id=>parseFloat(val(id,'0'))||0;
    const txt=(sel,v)=>{const e=$(sel); if(e)e.textContent=v;};
    const cls=(sel,classes)=>{const e=$(sel); if(e)e.className=classes;};
    const addOn=(sel,on,color)=>{const e=$(sel); if(!e)return; e.className='switch'+(on?' on '+color:'');};
    
    const setDeviceClass=(sel,stateClass)=>{
      const e=$(sel); if(!e)return;
      e.classList.remove('device-off','device-idle','device-unavailable','device-on-yellow','device-on-green','device-on-blue','device-on-purple','device-on-red','device-on-brown');
      e.classList.add(stateClass);
    };
    
    const fmt=(v,d=1)=>{const n=parseFloat(v); return Number.isFinite(n)?n.toFixed(d):'--';};
    function weatherCN(s){
      const map={sunny:'晴朗',clear:'晴朗',cloudy:'多云',partlycloudy:'局部多云',rainy:'下雨',pouring:'大雨',snowy:'下雪',fog:'有雾',windy:'有风',hail:'冰雹',lightning:'雷电'};
      return map[s]||s||'--';
    }
    function weatherIcon(s){
      const map={sunny:'mdi:weather-sunny',clear:'mdi:weather-sunny',cloudy:'mdi:weather-cloudy',partlycloudy:'mdi:weather-partly-cloudy',rainy:'mdi:weather-rainy',pouring:'mdi:weather-pouring',snowy:'mdi:weather-snowy',fog:'mdi:weather-fog',windy:'mdi:weather-windy',hail:'mdi:weather-hail',lightning:'mdi:weather-lightning'};
      return map[s]||'mdi:weather-partly-cloudy';
    }
    function stateCN(s){
      if(['on','playing','cool','heat','auto'].includes(s)) return '开';
      if(['off','idle','standby'].includes(s)) return '关';
      if(['unavailable','unknown'].includes(s)) return '离线';
      return s || '--';
    }
    function doorCN(s){
      if(['close','closed','off'].includes(s)) return '已关闭';
      if(['open','on'].includes(s)) return '已打开';
      if(s==='inside_unlock') return '室内解锁';
      if(s==='lock') return '已上锁';
      return s || '--';
    }
    function renderAllHA(){
      const now=new Date();
      txt('#clock-time', val('sensor.time', now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})));
      txt('#clock-date', val('sensor.date', now.toLocaleDateString('zh-CN')));
      const h=val('input_text.daily_quote', val('sensor.openclaw_hitokoto',''));
      const hf=val('input_text.daily_quote_source','');
      txt('#hitokoto', h || '');
      txt('#hitokoto-from', hf ? ' —— ' + hf : '');
    
      const weatherState=val('weather.home', val('weather.home_backup','--'));
      txt('#weather-summary', weatherCN(weatherState));
      const wi=$('#weather-icon'); if(wi) wi.setAttribute('icon', weatherIcon(weatherState));
      txt('#out-temp', fmt(val('sensor.outdoor_temperature'),1));
      txt('#env-temp', fmt(val('sensor.living_room_temperature'),1));
      txt('#env-hum', fmt(val('sensor.living_room_humidity'),0));
      txt('#pm25-value', fmt(val('sensor.pm25'),0));
    
      const lamp=val('light.living_room_lights');
      const lampOn=lamp==='on';
      txt('#lamp-status', lampOn?'开':'关');
      txt('#lamp-count', lampOn?'3':'0');
      txt('#lamp-control-text', lampOn?'开启':'关闭');
      cls('#lamp-control-text','state-word '+(lampOn?'green':'grey'));
      addOn('#lamp-switch',lampOn,'green-bg');
      setDeviceClass('#device-living-light', lamp==='unavailable'?'device-unavailable':(lampOn?'device-on-yellow':'device-off'));
    
      const climate=val('climate.living_room_ac');
      const currentTemp=attr('climate.living_room_ac','current_temperature',val('sensor.living_room_temperature'));
      txt('#climate-status', climate==='off'?'关闭':stateCN(climate));
      txt('#climate-temp', fmt(currentTemp,1)+'°C');
      addOn('#climate-switch', climate!=='off' && climate!=='unavailable','blue-bg');
      setDeviceClass('#device-climate', climate==='unavailable'?'device-unavailable':((climate!=='off')?'device-on-blue':'device-off'));
    
      const media=val('media_player.living_room_speaker');
      txt('#media-state', media==='playing'?'播放中':stateCN(media));
      cls('#media-state','state-word '+(media==='playing'?'purple':'grey'));
      setDeviceClass('#device-media', media==='unavailable'?'device-unavailable':(media==='playing'?'device-on-purple':(media==='off'?'device-off':'device-idle')));
    
      const door=val('binary_sensor.front_door_contact');
      const lockAction=val('lock.front_door');
      const doorText=doorCN(door==='close'?lockAction||door:door);
      txt('#lock-status', doorText);
      {
        const lockColor = (door==='open'||door==='on') ? 'red' : ((door==='unavailable'||door==='unknown') ? 'grey' : 'green');
        cls('#lock-status','state-word '+lockColor);
        cls('#lock-icon', lockColor);
      }
      txt('#door-state', doorCN(door));
      setDeviceClass('#device-lock', (door==='open'||door==='on')?'device-on-red':((door==='unavailable'||door==='unknown')?'device-unavailable':'device-on-green'));
    
      const garden=val('light.garden_light_strip');
      const gardenOn=garden==='on';
      txt('#garden-state-text', gardenOn?'开启':'关闭');
      cls('#garden-state-text','state-word '+(gardenOn?'green':'grey'));
      addOn('#garden-switch',gardenOn,'green-bg');
      setDeviceClass('#device-garden-light', garden==='unavailable'?'device-unavailable':(gardenOn?'device-on-yellow':'device-off'));
    
      const livingPresence = val('binary_sensor.living_room_presence')==='on'?'有人':'无人';
      txt('#living-room-info', livingPresence+' · '+fmt(val('sensor.living_room_temperature'),1)+'°C · '+fmt(val('sensor.living_room_humidity'),0)+'%');
      const bedroomPresence = val('binary_sensor.bedroom_presence')==='有人'?'有人':'无人';
      txt('#bedroom-room-info', bedroomPresence+' · '+fmt(val('sensor.bedroom_temperature'),1)+'°C · '+fmt(val('sensor.bedroom_humidity'),0)+'%');
      txt('#kitchen-room-info', (val('binary_sensor.kitchen_presence')==='on'?'有人':'无人')+' · '+fmt(val('sensor.kitchen_illuminance'),0)+'lx');
      txt('#garden-room-info', (gardenOn?'灯带开':'灯带关')+' · '+fmt(val('sensor.outdoor_humidity'),0)+'%');
    
      const kit=val('binary_sensor.kitchen_presence')==='on'?'有人':'无人';
      txt('#kitchen-env',kit);
    
      const p=num('sensor.current_power');
      const e=num('sensor.energy_cost_today');
      txt('#power-now',p.toFixed(0));
      txt('#energy-today',e.toFixed(2));
      txt('#energy-today-big',e.toFixed(1));
      const bars=$$('.bars span');
      const month=num('sensor.energy_cost_month');
      bars.forEach((b,i)=>{ const v=Math.max(12, Math.min(92, (p*2 + e*80 + i*9 + month%30))); b.style.height=v+'%'; });
    }
    root._watchedEntities=['input_text.','sensor.','binary_sensor.','light.','climate.','media_player.','switch.','weather.','scene.'];
    root._onHassUpdate=renderAllHA;
    renderAllHA();
    
          // hitokoto-inline-render-patch
          try {
            const qState = hass.states['input_text.daily_quote'];
            const fState = hass.states['input_text.daily_quote_source'];
            const q = qState && qState.state && !['unknown','unavailable'].includes(qState.state) ? qState.state : '';
            const f = fState && fState.state && !['unknown','unavailable'].includes(fState.state) ? fState.state : '';
            const line = q + (f ? ' —— ' + f : '');
            const qEl = root.querySelector('#hitokoto') || root.querySelector('[data-entity="input_text.daily_quote"]') || root.querySelector('.hitokoto-text');
            const fEl = root.querySelector('#hitokoto-from') || root.querySelector('#hitokoto_from') || root.querySelector('[data-entity="input_text.daily_quote_source"]') || root.querySelector('.hitokoto-from') || root.querySelector('.hitokoto-source');
            if (qEl) qEl.textContent = line;
            if (fEl) fEl.textContent = '';
          } catch(e) {}
    
