# 3D Compass
# Author: knoop7
# Version: 1.0
# Description: This module provides a 3D Compass for HTML Pro Card. High-precision compass with Canvas rendering and physics animation.
# Tags: Widget
# Image: 
# Link: https://github.com/ha-china/html-card-pro/discussions/9
# ID: 9

type: custom:html-pro-card
do_not_parse: true
update_interval: 0
entities:
  - sensor.phone_heading
  - sensor.phone_altitude
  - sensor.phone_pressure
content: |
  <style>
    :host {
      --compass-bg: radial-gradient(circle at 50% 50%, #222326 0%, #111214 100%);
      --brushed-rim: linear-gradient(135deg, #3a3c42 0%, #18191c 50%, #0d0e10 100%);
      --indicator-orange: #ff5511;
      --text-white: #e0e0e0;
      --text-dim: #70737a;
    }
    .compass-card {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--compass-bg);
      border-radius: 10px;
      padding: 32px 20px 20px 20px;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .compass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      background-image: radial-gradient(#fff 1px, transparent 0);
      background-size: 3px 3px;
    }
    .compass-viewport {
      position: relative;
      width: 290px;
      height: 290px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metal-rim-outer {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: var(--brushed-rim);
      box-shadow: 0 20px 45px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.15), inset 0 -2px 4px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .north-arrow-fixed {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 11px solid #ffffff;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
      z-index: 10;
    }
    .north-text-fixed {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 1px;
    }
    .dial-tunnel-inner {
      width: 216px;
      height: 216px;
      border-radius: 50%;
      background: #0a0b0d;
      border: 4px solid #1a1b1f;
      box-shadow: inset 0 12px 28px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    #compassRenderCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    .glass-optical-cap {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 5;
    }
    .dashboard-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 -1px 0 rgba(0, 0, 0, 0.6);
      padding-top: 16px;
      gap: 4px;
    }
    .grid-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-right: 1px solid rgba(0, 0, 0, 0.4);
      position: relative;
    }
    .grid-cell:last-child {
      border-right: none;
    }
    .grid-cell::after {
      content: "";
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(255, 255, 255, 0.02);
    }
    .cell-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cell-value {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-white);
    }
  </style>

  <div class="compass-card" id="compassCard">
    <div class="compass-viewport">
      <div class="north-text-fixed">N</div>
      <div class="metal-rim-outer">
        <div class="north-arrow-fixed"></div>
        <div class="dial-tunnel-inner">
          <canvas id="compassRenderCanvas" width="216" height="216"></canvas>
          <div class="glass-optical-cap"></div>
        </div>
      </div>
    </div>
    <div class="dashboard-grid">
      <div class="grid-cell">
        <span class="cell-label">NL</span>
        <span class="cell-value" id="valNL">40°1'45"</span>
      </div>
      <div class="grid-cell">
        <span class="cell-label">EL</span>
        <span class="cell-value" id="valEL">116°19'50"</span>
      </div>
      <div class="grid-cell">
        <span class="cell-label">Pressure</span>
        <span class="cell-value" id="valBaro">1006.8 hPa</span>
      </div>
      <div class="grid-cell">
        <span class="cell-label">Altitude</span>
        <span class="cell-value" id="valAlt">101.9 m</span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      if (root.__compass_engine_loaded) return;
      root.__compass_engine_loaded = true;
      const canvas = $('#compassRenderCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let currentAngle = 0;
      let targetAngle = 0;
      let waveTick = 0;
      const drawCompassMatrix = (renderHeading) => {
        ctx.clearRect(0, 0, 216, 216);
        const cx = 108;
        const cy = 108;
        const rad = -(renderHeading * Math.PI / 180);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        for (let i = 0; i < 360; i += 2) {
          ctx.beginPath();
          if (i % 30 === 0) {
            ctx.moveTo(0, -96);
            ctx.lineTo(0, -84);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.2;
          } else if (i % 10 === 0) {
            ctx.moveTo(0, -94);
            ctx.lineTo(0, -86);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
            ctx.lineWidth = 0.9;
          } else {
            ctx.moveTo(0, -92);
            ctx.lineTo(0, -87);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.09)';
            ctx.lineWidth = 0.6;
          }
          ctx.stroke();
          ctx.rotate(2 * Math.PI / 360);
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let angle = 0; angle < 360; angle += 15) {
          ctx.save();
          ctx.rotate(angle * Math.PI / 180);
          if (angle === 0) {
            ctx.font = 'bold 15px sans-serif';
            ctx.fillStyle = '#ff4400';
            ctx.fillText('N', 0, -73);
          } else if (angle === 90) {
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('E', 0, -73);
          } else if (angle === 180) {
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('S', 0, -73);
          } else if (angle === 270) {
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('W', 0, -73);
          } else if (angle % 30 === 0) {
            ctx.font = '9px monospace';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.fillText(angle.toString(), 0, -74);
          }
          ctx.restore();
        }
        ctx.restore();
        ctx.beginPath();
        ctx.arc(cx, cy, 97, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, 46, 0, Math.PI * 2);
        ctx.fillStyle = '#08080a';
        ctx.shadowColor = '#000000';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 6;
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.beginPath();
        ctx.arc(cx, cy, 45, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 41, 0, Math.PI * 2);
        const innerGrad = ctx.createRadialGradient(cx, cy - 10, 5, cx, cy, 42);
        innerGrad.addColorStop(0, '#202125');
        innerGrad.addColorStop(1, '#070709');
        ctx.fillStyle = innerGrad;
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.beginPath();
        ctx.moveTo(0, -42);
        ctx.lineTo(-12, -28);
        ctx.lineTo(12, -28);
        ctx.closePath();
        const pointerGrad = ctx.createLinearGradient(-12, 0, 12, 0);
        pointerGrad.addColorStop(0, '#55575e');
        pointerGrad.addColorStop(0.5, '#7e818c');
        pointerGrad.addColorStop(1, '#333438');
        ctx.fillStyle = pointerGrad;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, -42);
        ctx.lineTo(0, -28);
        ctx.strokeStyle = '#ff3300';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '900 27px sans-serif';
        ctx.fillStyle = varColor('--indicator-orange', '#ff5511');
        ctx.shadowColor = varColor('--indicator-orange', '#ff5511');
        ctx.shadowBlur = 10;
        const displayDeg = Math.floor((renderHeading % 360 + 360) % 360);
        ctx.fillText(displayDeg + '°', cx, cy + 2);
        ctx.restore();
      };
      const varColor = (varName, fallback) => {
        return getComputedStyle(document.documentElement).getPropertyValue(varName).trim() || fallback;
      };
      const mainEngineLoop = () => {
        const headingEntity = hass.states['sensor.phone_heading'];
        if (headingEntity && headingEntity.state !== 'unknown' && headingEntity.state !== 'unavailable') {
          targetAngle = parseFloat(headingEntity.state) || 0;
          let diff = targetAngle - currentAngle;
          while (diff < -180) diff += 360;
          while (diff > 180) diff -= 360;
          currentAngle += diff * 0.12;
        } else {
          waveTick += 0.025;
          targetAngle = 352 + Math.sin(waveTick) * 6 + Math.cos(waveTick * 2.3) * 2.5;
          currentAngle += (targetAngle - currentAngle) * 0.08;
        }
        drawCompassMatrix(currentAngle);
        requestAnimationFrame(mainEngineLoop);
      };
      const syncGridEntities = () => {
        const altEntity = hass.states['sensor.phone_altitude'];
        const baroEntity = hass.states['sensor.phone_pressure'];
        const valAlt = $('#valAlt');
        const valBaro = $('#valBaro');
        if (altEntity && altEntity.state !== 'unknown') {
          if (valAlt) valAlt.textContent = parseFloat(altEntity.state).toFixed(1) + ' m';
        }
        if (baroEntity && baroEntity.state !== 'unknown') {
          if (valBaro) valBaro.textContent = parseFloat(baroEntity.state).toFixed(1) + ' hPa';
        }
      };
      root._onHassUpdate = () => {
        syncGridEntities();
      };
      mainEngineLoop();
    })();
  </script>
