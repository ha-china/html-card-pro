# Synology NAS Panel
# Author: knoop7
# Version: 1.0
# Description: This module provides a Synology NAS Panel for HTML Pro Card. 3D drive bay with mechanical eject animation.
# Tags: Appliance
# Image: https://i.postimg.cc/2bgYsKLj/Mac-2026-05-26-01-31-23.jpg
# Link: https://github.com/ha-china/html-card-pro/discussions/10
# ID: 10

type: custom:html-pro-card
do_not_parse: true
scripts:
  - https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js
content: |
  <style>
    .syno-chassis-box {
      position: relative;
      background: radial-gradient(circle at 50% 30%, #2c2e31 0%, #1a1b1d 100%);
      border: 1px solid #141517;
      border-radius: 12px;
      padding: 24px 20px 20px 20px;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.08), inset 0 -2px 6px rgba(0, 0, 0, 0.6), 0 16px 32px rgba(0, 0, 0, 0.5);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 18px;
      perspective: 1000px;
    }
    .syno-front-panel {
      background: #151618;
      border-radius: 8px;
      border: 1px solid #111112;
      box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.85);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .syno-top-console {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 10px 4px;
      border-bottom: 1px solid #202225;
    }
    .led-cluster { display: flex; gap: 12px; }
    .led-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .led-node span { font-size: 8px; font-weight: 700; color: #7b818a; font-family: monospace; }
    .hw-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3c40; box-shadow: inset 0 1px 1px rgba(0,0,0,0.5); }
    .hw-dot.green-on { background: #73f973; box-shadow: 0 0 6px #52d652, 0 0 12px rgba(115,249,115,0.6); }
    .hw-dot.orange-on { background: #ffaa00; box-shadow: 0 0 6px #ff8800, 0 0 12px rgba(255,170,0,0.6); }
    .syno-power-housing { width: 48px; height: 20px; background: linear-gradient(180deg, #18191b, #25272a); border-radius: 4px; border: 1px solid #111; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .syno-power-btn { width: 36px; height: 12px; background: linear-gradient(180deg, #3a3d42, #242629); border-radius: 2px; border: 1px solid #1c1d1f; position: relative; }
    .syno-power-btn::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 2px; background: #444; }
    .syno-power-housing.active .syno-power-btn::before { background: #33b5ff; box-shadow: 0 0 4px #0099ff; }
    .syno-drive-matrix {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      background: #0d0e0f;
      padding: 16px 10px;
      border-radius: 6px;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.9);
      position: relative;
    }
    .syno-drive-caddy {
      background: linear-gradient(90deg, #1d1e21 0%, #2a2c30 30%, #2a2c30 70%, #18191b 100%);
      border: 1px solid #131416;
      border-top: 1px solid #444950;
      border-radius: 4px;
      height: 145px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      position: relative;
      transform-origin: center top;
      will-change: transform, box-shadow;
      z-index: 5;
    }
    .syno-drive-caddy::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 4px;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .syno-drive-caddy.ejected { z-index: 10; }
    .caddy-triangle-led { width: 10px; height: 8px; }
    .caddy-triangle-led polygon { fill: #222; transition: fill 0.3s ease; }
    .syno-drive-caddy[data-led="normal"] .caddy-triangle-led polygon { fill: #00ffcc; filter: drop-shadow(0 0 3px #00ffcc); }
    .syno-drive-caddy[data-led="ejected"] .caddy-triangle-led polygon { fill: #ff3b30; filter: drop-shadow(0 0 3px #ff3b30); }
    .caddy-lock-eye { width: 12px; height: 12px; border-radius: 50%; background: #141517; border: 1px solid #333; position: relative; }
    .caddy-lock-eye::after { content: ''; position: absolute; top: 2px; bottom: 2px; left: 50%; width: 2px; background: #444; transform: translateX(-50%); }
    .caddy-meta { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .caddy-num { font-size: 9px; font-weight: 800; color: #555; font-family: monospace; }
    .caddy-label { font-size: 8px; font-weight: 600; color: #8c939d; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
    .caddy-temp { font-size: 10px; font-family: monospace; font-weight: bold; color: #00ffcc; margin-top: 4px; }
    .syno-dashboard-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; }
    .syno-db-card { background: #1a1b1d; border: 1px solid #222428; border-radius: 6px; padding: 10px 12px; }
    .db-header-title { font-size: 10px; font-weight: 700; color: #6a717c; letter-spacing: 0.5px; margin-bottom: 6px; }
    .telemetry-row { display: flex; justify-content: space-between; align-items: baseline; font-family: monospace; }
    .telemetry-main-val { font-size: 20px; font-weight: bold; color: #ffffff; }
    .pool-item { display: flex; justify-content: space-between; font-size: 10px; font-family: monospace; color: #b0b5bc; margin-top: 3px; }
    .pool-item span:last-child { color: #fff; font-weight: bold; }
  </style>

  <div class="syno-chassis-box">
    <div class="syno-front-panel">
      <div class="syno-top-console">
        <div class="led-cluster">
          <div class="led-node"><div class="hw-dot" id="led-status"></div><span>STATUS</span></div>
          <div class="led-node"><div class="hw-dot" id="led-alert"></div><span>ALERT</span></div>
          <div class="led-node"><div class="hw-dot" id="led-lan1"></div><span>LAN1</span></div>
        </div>
        <div class="syno-power-housing" id="syno-master-power"><div class="syno-power-btn"></div></div>
      </div>
      <div class="syno-drive-matrix" id="syno-drive-matrix-container"></div>
    </div>
    <div class="syno-dashboard-grid">
      <div class="syno-db-card">
        <div class="db-header-title">SYSTEM COMPUTE</div>
        <div class="telemetry-row">
          <div><span class="telemetry-main-val" id="db-mem">--</span><span style="font-size:10px; color:#555;">GB RAM</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:6px; font-size:10px; font-family:monospace; color:#888;">
          <span>CPU: <b id="db-txt-cpu" style="color:#fff">--</b>°C</span>
          <span>BD: <b id="db-txt-board" style="color:#fff">--</b>°C</span>
        </div>
      </div>
      <div class="syno-db-card">
        <div class="db-header-title">STORAGE & UPS ENVIRONMENT</div>
        <div class="pool-item"><span>Volume 1:</span><span id="db-vol1">-- GB</span></div>
        <div class="pool-item"><span>Volume 2:</span><span id="db-vol2">-- TB</span></div>
        <div class="pool-item" style="border-top:1px dashed #2c2e32; margin-top:4px; padding-top:4px;">
          <span style="color:#73f973;">UPS BATT:</span><span id="db-ups-cap" style="color:#73f973;">-- %</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SYNO_CONFIG = {
      nas_online: 'binary_sensor.feiniu_nas_online',
      power_switch: 'switch.feiniu_nas_power',
      memory_free: 'sensor.feiniu_nas_free_memory',
      temp_cpu: 'sensor.feiniu_nas_cpu_temp',
      temp_board: 'sensor.feiniu_nas_board_temp',
      vol1_space: 'sensor.feiniu_nas_vol1_used',
      vol2_space: 'sensor.feiniu_nas_vol2_used',
      disks: [
        { id: 'sensor.disk_ssd_temp', name: 'SSD' },
        { id: 'sensor.disk_wd40_temp', name: 'WD40EJSX' },
        { id: 'sensor.disk_wd43_1_temp', name: 'WD43-1' },
        { id: 'sensor.disk_wd43_2_temp', name: 'WD43-2' },
        { id: 'sensor.disk_wd43_3_temp', name: 'WD43-3' }
      ],
      ups_cap: 'sensor.ups_battery_capacity'
    };
    const runRegistryWatch = () => {
      const collection = [SYNO_CONFIG.nas_online, SYNO_CONFIG.power_switch, SYNO_CONFIG.memory_free, SYNO_CONFIG.temp_cpu, SYNO_CONFIG.temp_board, SYNO_CONFIG.vol1_space, SYNO_CONFIG.vol2_space, SYNO_CONFIG.ups_cap];
      SYNO_CONFIG.disks.forEach(d => collection.push(d.id));
      return collection;
    };
    root._watchedEntities = runRegistryWatch();
    const assembleInteractiveDriveBays = () => {
      if (root._baysAssembled) return;
      root._baysAssembled = true;
      const box = $('#syno-drive-matrix-container');
      box.innerHTML = '';
      SYNO_CONFIG.disks.forEach((disk, idx) => {
        const bay = claw.el('div', { class: 'syno-drive-caddy', id: 'syno-bay-' + idx, 'data-led': 'unavailable' });
        bay.innerHTML = '<svg class="caddy-triangle-led" viewBox="0 0 10 8"><polygon points="5,1 9,7 1,7"/></svg><div class="caddy-meta"><div class="caddy-num">' + (idx + 1) + '</div><div class="caddy-label">' + disk.name + '</div><div class="caddy-temp"><span class="val-bay-temp">--</span>°</div></div><div class="caddy-lock-eye"></div>';
        bay.addEventListener('click', () => {
          const isEjected = bay.classList.contains('ejected');
          anime.remove(bay);
          if (!isEjected) {
            bay.classList.add('ejected');
            bay.setAttribute('data-led', 'ejected');
            anime({ targets: bay, scale: 1.05, translateY: -24, translateZ: 30, rotateX: 2, boxShadow: '0 20px 35px rgba(0,0,0,0.6), 0 10px 10px rgba(0,0,0,0.4)', duration: 400, easing: 'easeOutCubic' });
          } else {
            bay.classList.remove('ejected');
            anime({ targets: bay, scale: 1.0, translateY: 0, translateZ: 0, rotateX: 0, boxShadow: '0 4px 6px rgba(0,0,0,0.4)', duration: 350, easing: 'linear', complete: () => {
              const currentTemp = claw.state(disk.id)?.state;
              if (currentTemp && currentTemp !== 'unavailable') { bay.setAttribute('data-led', 'normal'); } else { bay.setAttribute('data-led', 'unavailable'); }
            }});
          }
        });
        box.appendChild(bay);
      });
    };
    const launchSynoEngine = () => {
      if (!window.anime) { setTimeout(launchSynoEngine, 50); return; }
      assembleInteractiveDriveBays();
      root._onHassUpdate = () => {
        const pull = (entityId) => claw.state(entityId);
        const onlineData = pull(SYNO_CONFIG.nas_online);
        const powerData = pull(SYNO_CONFIG.power_switch);
        const isOnline = onlineData ? (onlineData.state === 'on' || onlineData.state === 'online') : false;
        const isPowerOn = powerData ? powerData.state === 'on' : false;
        const powerHousing = $('#syno-master-power');
        const statusLed = $('#led-status');
        const alertLed = $('#led-alert');
        const lanLed = $('#led-lan1');
        if (isPowerOn) powerHousing.classList.add('active'); else powerHousing.classList.remove('active');
        if (isOnline) { statusLed.className = 'hw-dot green-on'; alertLed.className = 'hw-dot'; lanLed.className = 'hw-dot green-on'; }
        else if (isPowerOn) { statusLed.className = 'hw-dot orange-on'; alertLed.className = 'hw-dot'; lanLed.className = 'hw-dot'; }
        else { statusLed.className = 'hw-dot'; alertLed.className = 'hw-dot orange-on'; lanLed.className = 'hw-dot'; }
        $('#db-mem').textContent = pull(SYNO_CONFIG.memory_free)?.state ?? '--';
        $('#db-txt-cpu').textContent = pull(SYNO_CONFIG.temp_cpu)?.state ?? '--';
        $('#db-txt-board').textContent = pull(SYNO_CONFIG.temp_board)?.state ?? '--';
        $('#db-vol1').textContent = (pull(SYNO_CONFIG.vol1_space)?.state ?? '--') + ' GB';
        $('#db-vol2').textContent = (pull(SYNO_CONFIG.vol2_space)?.state ?? '--') + ' TB';
        $('#db-ups-cap').textContent = (pull(SYNO_CONFIG.ups_cap)?.state ?? '--') + ' %';
        SYNO_CONFIG.disks.forEach((disk, idx) => {
          const bayEl = $('#syno-bay-' + idx);
          if (!bayEl) return;
          const currentTemp = pull(disk.id)?.state;
          bayEl.querySelector('.val-bay-temp').textContent = currentTemp && currentTemp !== 'unavailable' ? currentTemp : '--';
          if (!bayEl.classList.contains('ejected')) {
            if (!isOnline || !currentTemp || currentTemp === 'unavailable') { bayEl.setAttribute('data-led', 'unavailable'); }
            else { bayEl.setAttribute('data-led', 'normal'); }
          }
        });
      };
      $('#syno-power-housing').addEventListener('click', () => { claw.toggle(SYNO_CONFIG.power_switch); });
      root._onHassUpdate();
    };
    launchSynoEngine();
  </script>
