id: weather
name: 天气卡片
desc: 天气实体状态展示
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .weather-card {
      padding: 24px;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      border-radius: 16px;
      color: #fff;
      text-align: center;
    }
    .weather-temp {
      font-size: 36px;
      font-weight: bold;
    }
  </style>
  <div class="weather-card">
    <div class="weather-temp">{{ states("weather.home") }}</div>
    <div>{{ state_attr("weather.home", "temperature") }}°C</div>
  </div>
