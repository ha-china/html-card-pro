id: clock
name: 数字时钟
desc: 实时时间显示
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .clock {
      font-size: 48px;
      font-family: monospace;
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 16px;
    }
  </style>
  <div class="clock" id="clock">00:00:00</div>
  <script>
    setInterval(function() {
      var d = new Date();
      $("#clock").textContent = d.toLocaleTimeString();
    }, 1000);
  </script>
