id: circular-progress
name: 圆形进度
desc: 圆环进度条展示
author: knoop7
version: 1.0
content: |
  <style>
    .circular-container {
      padding: 30px;
      text-align: center;
      background: #f8f9fa;
      border-radius: 16px;
    }
    .circular-progress {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      position: relative;
    }
    .circular-progress svg {
      transform: rotate(-90deg);
    }
    .circular-bg {
      fill: none;
      stroke: #e0e0e0;
      stroke-width: 10;
    }
    .circular-fill {
      fill: none;
      stroke: #4facfe;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 314;
      stroke-dashoffset: 78;
      animation: circular-anim 2s ease-out forwards;
    }
    .circular-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
    @keyframes circular-anim {
      from { stroke-dashoffset: 314; }
      to { stroke-dashoffset: 78; }
    }
  </style>
  <div class="circular-container">
    <div class="circular-progress">
      <svg width="120" height="120">
        <circle class="circular-bg" cx="60" cy="60" r="50"/>
        <circle class="circular-fill" cx="60" cy="60" r="50"/>
      </svg>
      <div class="circular-text">75%</div>
    </div>
  </div>
