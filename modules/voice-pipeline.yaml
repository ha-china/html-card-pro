id: voice-pipeline
name: 语音管道
desc: 3D物理管道语音交互卡片
author: knoop7
version: 1.0
---
type: custom:html-pro-card
update_interval: 0
do_not_parse: true
content: |
  <style>
    :host {
      --pure-white: #ffffff;
      --ink-black: #1a1a1a;
      --subtle-shadow: rgba(0, 0, 0, 0.04);
      --active-blue: #007aff;
    }
    .zen-container {
      background: var(--pure-white);
      min-height: 400px;
      padding: 60px 40px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 20px 60px var(--subtle-shadow);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      overflow: hidden;
    }
    .pipeline-3d {
      position: relative;
      width: 120px;
      height: 120px;
      perspective: 800px;
      cursor: pointer;
      margin-top: 20px;
    }
    .tunnel {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform: rotateX(60deg);
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .pipeline-3d:hover .tunnel {
      transform: rotateX(50deg) scale(1.05);
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 20px var(--subtle-shadow);
      transition: all 0.1s linear;
    }
    .ring-1 { transform: translateZ(0px); border-color: rgba(0,0,0,0.15); }
    .ring-2 { transform: translateZ(-20px); }
    .ring-3 { transform: translateZ(-40px); }
    .ring-4 { transform: translateZ(-60px); background: rgba(0, 0, 0, 0.02); }
    .core-glow {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: var(--active-blue);
      transform: translateZ(-80px);
      opacity: 0;
      filter: blur(15px);
      transition: opacity 0.4s ease;
    }
    .tunnel.active .core-glow {
      opacity: 0.6;
    }
    .tunnel.active .ring {
      border-color: rgba(0, 122, 255, 0.3);
    }
    .typography {
      text-align: center;
      width: 100%;
    }
    .status-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #999;
      margin-bottom: 24px;
    }
    .transcript {
      font-size: 18px;
      font-weight: 300;
      color: var(--ink-black);
      min-height: 2em;
      line-height: 1.4;
      transition: opacity 0.3s;
    }
    .ha-response {
      font-size: 14px;
      color: var(--active-blue);
      margin-top: 12px;
      font-weight: 400;
    }
  </style>
  <div class="zen-container">
    <div class="typography">
      <div class="status-label" id="sys-status">SYSTEM IDLE</div>
    </div>
    <div class="pipeline-3d" id="mic-trigger">
      <div class="tunnel" id="tunnel-ui">
        <div class="ring ring-1" id="r1"></div>
        <div class="ring ring-2" id="r2"></div>
        <div class="ring ring-3" id="r3"></div>
        <div class="ring ring-4" id="r4"></div>
        <div class="core-glow"></div>
      </div>
    </div>
    <div class="typography" style="margin-top: 40px;">
      <div class="transcript" id="user-text">Tap the conduit to speak.</div>
      <div class="ha-response" id="ai-text"></div>
    </div>
  </div>
  <script>
    const trigger = root.querySelector('#mic-trigger');
    const tunnelUI = root.querySelector('#tunnel-ui');
    const statusEl = root.querySelector('#sys-status');
    const userTextEl = root.querySelector('#user-text');
    const aiTextEl = root.querySelector('#ai-text');
    const rings = [
      root.querySelector('#r1'),
      root.querySelector('#r2'),
      root.querySelector('#r3'),
      root.querySelector('#r4')
    ];
    let audioCtx, analyser, dataArray;
    let isActive = false;
    let recognition;
    function initSpeech() {
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!window.SpeechRecognition) {
        userTextEl.innerText = "Browser does not support Speech API.";
        return false;
      }
      recognition = new window.SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = true;
      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map(result => result[0])
          .map(result => result.transcript)
          .join('');
        userTextEl.innerText = transcript;
        if (event.results[0].isFinal) {
          sendToHassPipeline(transcript);
        }
      };
      recognition.onend = () => {
        closePipeline();
      };
      return true;
    }
    async function sendToHassPipeline(text) {
      statusEl.innerText = "PROCESSING";
      try {
        const response = await hass.callWS({
          type: 'conversation/process',
          text: text,
        });
        const reply = response.response.speech.plain.speech;
        aiTextEl.innerText = reply;
        const utterance = new SpeechSynthesisUtterance(reply);
        utterance.lang = 'zh-CN';
        window.speechSynthesis.speak(utterance);
        statusEl.innerText = "SYSTEM IDLE";
      } catch (err) {
        console.error("HA Pipeline Error:", err);
        aiTextEl.innerText = "Pipeline connection failed.";
        statusEl.innerText = "ERROR";
      }
    }
    async function openAudioPhysics() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 32;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        renderPhysics();
      } catch (e) {
        console.log("Audio physics disabled.", e);
      }
    }
    function renderPhysics() {
      if (!isActive) return;
      requestAnimationFrame(renderPhysics);
      analyser.getByteFrequencyData(dataArray);
      const v1 = dataArray[2] / 2;
      const v2 = dataArray[4] / 2;
      rings[0].style.transform = `translateZ(${v1 * 0.5}px) scale(${1 + v1/500})`;
      rings[1].style.transform = `translateZ(${-20 - v2 * 0.4}px)`;
      rings[2].style.transform = `translateZ(${-40 - v1 * 0.3}px)`;
    }
    function openPipeline() {
      if (isActive) return;
      if (!recognition && !initSpeech()) return;
      isActive = true;
      tunnelUI.classList.add('active');
      statusEl.innerText = "LISTENING_";
      userTextEl.innerText = "...";
      aiTextEl.innerText = "";
      recognition.start();
      openAudioPhysics();
    }
    function closePipeline() {
      isActive = false;
      tunnelUI.classList.remove('active');
      rings[0].style.transform = `translateZ(0px)`;
      rings[1].style.transform = `translateZ(-20px)`;
      rings[2].style.transform = `translateZ(-40px)`;
      if (audioCtx) audioCtx.close();
    }
    trigger.onclick = () => {
      if (isActive) {
        recognition.stop();
        closePipeline();
      } else {
        openPipeline();
      }
    };
  </script>
