id: stat-card
name: 统计卡片
desc: 数据统计展示卡片
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .stat-item {
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .stat-item:nth-child(1) .stat-value { color: #4facfe; }
    .stat-item:nth-child(2) .stat-value { color: #43e97b; }
    .stat-item:nth-child(3) .stat-value { color: #fa709a; }
    .stat-item:nth-child(4) .stat-value { color: #fee140; }
  </style>
  <div class="stat-grid">
    <div class="stat-item">
      <div class="stat-value">128</div>
      <div class="stat-label">在线设备</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">24°</div>
      <div class="stat-label">室内温度</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">65%</div>
      <div class="stat-label">空气湿度</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">12</div>
      <div class="stat-label">自动化</div>
    </div>
  </div>
