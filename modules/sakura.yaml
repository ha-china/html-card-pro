id: sakura
name: 樱花雨
desc: 樱花飘落动画效果
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .sakura-btn {
      padding: 16px 32px;
      background: #ff69b4;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
  <div style="padding:24px;text-align:center;">
    <button class="sakura-btn">点击下樱花雨</button>
  </div>
  <script>
    var b = $(".sakura-btn");
    if (b) b.onclick = function() {
      for (var i = 0; i < 50; i++) {
        setTimeout(function() {
          var p = document.createElement("div");
          p.style.cssText = "position:absolute;width:12px;height:12px;background:#ffb7c5;border-radius:50% 0 50% 50%;left:" + Math.random() * 100 + "vw;top:-20px;";
          overlay.appendChild(p);
          p.animate([{top: "-20px", opacity: 1}, {top: "100vh", opacity: 0}], {duration: 3000});
          setTimeout(function() { p.remove() }, 3000);
        }, i * 80);
      }
    };
  </script>
