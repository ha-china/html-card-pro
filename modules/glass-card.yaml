id: glass-card
name: 玻璃卡片
desc: 毛玻璃效果卡片
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .glass-wrapper {
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 20px;
    }
    .glass-card {
      padding: 32px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      text-align: center;
    }
    .glass-card h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .glass-card p {
      margin: 0;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
  <div class="glass-wrapper">
    <div class="glass-card">
      <h3>毛玻璃效果</h3>
      <p>现代化的磨砂玻璃设计风格</p>
    </div>
  </div>
