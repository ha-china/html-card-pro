id: mdi-test
name: MDI图标测试
desc: 测试调用HA内部MDI图标
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .mdi-test {
      padding: 24px;
      text-align: center;
    }
    .mdi-grid {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .mdi-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: var(--secondary-background-color);
      border-radius: 12px;
      min-width: 80px;
    }
    .mdi-item ha-icon {
      --mdc-icon-size: 32px;
      color: var(--primary-color);
    }
    .mdi-label {
      font-size: 11px;
      color: var(--secondary-text-color);
    }
  </style>
  <div class="mdi-test">
    <div class="mdi-grid">
      <div class="mdi-item">
        <ha-icon icon="mdi:home"></ha-icon>
        <span class="mdi-label">home</span>
      </div>
      <div class="mdi-item">
        <ha-icon icon="mdi:lightbulb"></ha-icon>
        <span class="mdi-label">lightbulb</span>
      </div>
      <div class="mdi-item">
        <ha-icon icon="mdi:thermometer"></ha-icon>
        <span class="mdi-label">thermometer</span>
      </div>
      <div class="mdi-item">
        <ha-icon icon="mdi:power"></ha-icon>
        <span class="mdi-label">power</span>
      </div>
    </div>
  </div>
