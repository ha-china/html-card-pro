id: progress-bar
name: 进度条
desc: 动态进度条展示
author: knoop7
version: 1.0
content: |
  <style>
    .progress-container {
      padding: 24px;
      background: #f5f5f5;
      border-radius: 12px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
    }
    .progress-track {
      height: 12px;
      background: #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 75%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 6px;
      animation: progress-pulse 2s ease-in-out infinite;
    }
    @keyframes progress-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
  <div class="progress-container">
    <div class="progress-label">
      <span>下载进度</span>
      <span>75%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>
