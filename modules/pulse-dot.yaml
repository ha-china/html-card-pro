id: pulse-dot
name: 脉冲圆点
desc: 呼吸脉冲动画效果
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .pulse-container {
      padding: 40px;
      background: #1a1a2e;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .pulse-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00d9ff;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .pulse-dot:nth-child(2) { animation-delay: 0.3s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(0,217,255,0.7);
      }
      50% {
        transform: scale(1.2);
        opacity: 0.8;
        box-shadow: 0 0 20px 10px rgba(0,217,255,0);
      }
    }
  </style>
  <div class="pulse-container">
    <div class="pulse-dot"></div>
    <div class="pulse-dot"></div>
    <div class="pulse-dot"></div>
  </div>
