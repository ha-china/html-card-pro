id: countdown
name: 倒计时
desc: 动态倒计时显示
author: knoop7
version: 1.0
---
type: custom:html-pro-card
content: |
  <style>
    .countdown-container {
      padding: 30px;
      background: linear-gradient(135deg, #232526, #414345);
      border-radius: 16px;
      text-align: center;
    }
    .countdown-title {
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
      opacity: 0.8;
    }
    .countdown-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .countdown-item {
      background: rgba(255,255,255,0.1);
      padding: 16px 20px;
      border-radius: 12px;
      min-width: 60px;
    }
    .countdown-value {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
    }
    .countdown-label {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
  </style>
  <div class="countdown-container">
    <div class="countdown-title">距离新年还有</div>
    <div class="countdown-grid">
      <div class="countdown-item">
        <div class="countdown-value">12</div>
        <div class="countdown-label">天</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value">08</div>
        <div class="countdown-label">时</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value">32</div>
        <div class="countdown-label">分</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value">45</div>
        <div class="countdown-label">秒</div>
      </div>
    </div>
  </div>
