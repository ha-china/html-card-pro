# 模块模板 - 复制此文件并修改
type: custom:html-pro-card
do_not_parse: true
update_interval: 0
ignore_line_breaks: true
content: |
  <style>
    .my-card {
      padding: 20px;
      background: var(--card-background-color);
      border-radius: 10px;
      text-align: center;
    }
    .my-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary-text-color);
    }
  </style>
  
  <div class="my-card">
    <div class="my-title">Hello World</div>
  </div>
  
  <script>
    // 你的 JavaScript 代码
    console.log('Module loaded');
  </script>
