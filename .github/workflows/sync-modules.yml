name: Sync Discussions to Store

on:
  discussion:
    types: [created, edited, deleted]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Discussions and Generate Modules
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Ensure mods directory exists
            if (!fs.existsSync('mods')) fs.mkdirSync('mods');
            
            const query = `
              query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  discussions(first: 100, categoryId: null) {
                    nodes {
                      number
                      title
                      body
                      author { login }
                      createdAt
                      url
                    }
                  }
                }
              }
            `;
            
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              name: context.repo.repo
            });
            
            const modules = [];
            const discussions = result.repository.discussions.nodes;
            
            // Security: allowed external domains whitelist
            const ALLOWED_DOMAINS = [
              'cdn.jsdelivr.net',
              'cdnjs.cloudflare.com',
              'unpkg.com',
              'fonts.googleapis.com',
              'fonts.gstatic.com',
              'raw.githubusercontent.com',
              'github.com',
              'via.placeholder.com'
            ];
            
            const isUrlSafe = (url) => {
              if (!url) return true;
              try {
                const hostname = new URL(url).hostname;
                return ALLOWED_DOMAINS.some(d => hostname === d || hostname.endsWith('.' + d));
              } catch { return false; }
            };
            
            const hasUnsafeContent = (yaml) => {
              // Block dangerous patterns
              const dangerous = [
                /eval\s*\(/i,
                /Function\s*\(/i,
                /document\.cookie/i,
                /localStorage/i,
                /sessionStorage/i,
                /XMLHttpRequest/i,
                /fetch\s*\([^)]*(?!hass)/i,
                /<iframe/i,
                /javascript:/i,
                /data:text\/html/i,
                /on\w+\s*=/i
              ];
              return dangerous.some(p => p.test(yaml));
            };
            
            const extractUrls = (text) => {
              const urls = [];
              const patterns = [
                /https?:\/\/[^\s"'<>]+/g,
                /src=["']([^"']+)["']/gi,
                /href=["']([^"']+)["']/gi,
                /url\(["']?([^"')]+)["']?\)/gi
              ];
              for (const p of patterns) {
                const matches = text.matchAll(p);
                for (const m of matches) urls.push(m[1] || m[0]);
              }
              return urls.filter(u => u.startsWith('http'));
            };
            
            for (const disc of discussions) {
              if (!disc.body) continue;
              
              // Match YAML in details block or direct code block
              const yamlMatch = disc.body.match(/```ya?ml\s*([\s\S]*?)```/i);
              if (!yamlMatch) continue;
              
              const yamlContent = yamlMatch[1].trim();
              if (!yamlContent.includes('type: custom:html-pro-card')) continue;
              
              // Security check: dangerous patterns
              if (hasUnsafeContent(yamlContent)) {
                console.log(`⚠️ BLOCKED: ${disc.title} - contains unsafe code`);
                continue;
              }
              
              // Security check: external URLs
              const urls = extractUrls(yamlContent);
              const unsafeUrls = urls.filter(u => !isUrlSafe(u));
              if (unsafeUrls.length > 0) {
                console.log(`⚠️ BLOCKED: ${disc.title} - unsafe URLs: ${unsafeUrls.join(', ')}`);
                continue;
              }
              
              // Extract description
              const descMatch = disc.body.match(/^This module provides[^\n]+/im);
              let description = descMatch ? descMatch[0].replace(/\*\*/g, '') : '';
              
              // Extract author and version
              const authorMatch = disc.body.match(/\*\*Author\*\*:\s*(\S+)/i);
              const versionMatch = disc.body.match(/\*\*Version\*\*:\s*(\S+)/i);
              
              // Extract tags and name from title
              const tagMatch = disc.title.match(/^\[([^\]]+)\]/);
              const tags = tagMatch ? tagMatch[1].split(/[,，]/).map(t => t.trim()) : [];
              const name = disc.title.replace(/^\[.*?\]\s*/, '').trim();
              
              // Extract image URL and download to repo (supports markdown and HTML img)
              const mdImgMatch = disc.body.match(/!\[[^\]]*\]\((https?:\/\/[^\s)]+)\)/);
              const htmlImgMatch = disc.body.match(/<img[^>]+src=["'](https?:\/\/[^"']+)["']/i);
              const imgMatch = mdImgMatch || htmlImgMatch;
              let image = '';
              if (imgMatch && imgMatch[1]) {
                const imgUrl = imgMatch[1];
                const imgExt = imgUrl.match(/\.(png|jpg|jpeg|gif|webp)/i)?.[1] || 'png';
                const imgFilename = `images/${disc.number}.${imgExt}`;
                
                try {
                  const https = require('https');
                  const http = require('http');
                  const imgFs = require('fs');
                  
                  if (!imgFs.existsSync('images')) imgFs.mkdirSync('images');
                  
                  const downloadImage = (url, dest) => new Promise((resolve, reject) => {
                    const protocol = url.startsWith('https') ? https : http;
                    const file = imgFs.createWriteStream(dest);
                    protocol.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (response) => {
                      if (response.statusCode === 301 || response.statusCode === 302) {
                        downloadImage(response.headers.location, dest).then(resolve).catch(reject);
                        return;
                      }
                      response.pipe(file);
                      file.on('finish', () => { file.close(); resolve(); });
                    }).on('error', reject);
                  });
                  
                  await downloadImage(imgUrl, imgFilename);
                  image = 'https://cdn.jsdelivr.net/gh/ha-china/html-card-pro@main/' + imgFilename;
                  console.log(`  📷 Downloaded: ${imgFilename}`);
                } catch (e) {
                  console.log(`  ⚠️ Failed to download image: ${e.message}`);
                  image = imgUrl;
                }
              }
              
              // Creator
              const creator = authorMatch ? authorMatch[1] : disc.author.login;
              
              // Generate safe filename
              const safeName = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
              const filename = `mods/${disc.number}-${safeName}.yaml`;
              
              // Write individual YAML file with metadata header
              const header = [
                '# ' + name,
                '# Author: ' + creator,
                '# Version: ' + (versionMatch ? versionMatch[1] : '1.0'),
                '# Description: ' + description,
                '# Tags: ' + tags.join(', '),
                '# Image: ' + image,
                '# Link: ' + disc.url,
                '# ID: ' + disc.number,
                '',
                yamlContent,
                ''
              ].join('\n');
              fs.writeFileSync(filename, header);
              
              // Add to store.json index
              modules.push({
                id: disc.number,
                name: name,
                version: versionMatch ? versionMatch[1] : '1.0',
                creator: creator,
                description: description,
                tags: tags,
                image: image,
                link: disc.url,
                file: filename
              });
              
              console.log(`✓ ${name} -> ${filename}`);
            }
            
            // Sort by id descending (newest first)
            modules.sort((a, b) => b.id - a.id);
            
            fs.writeFileSync('store.json', JSON.stringify(modules, null, 2));
            console.log(`\n✅ Generated ${modules.length} modules`);
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mods/ store.json
          [ -d images ] && git add images/
          git diff --staged --quiet || git commit -m "sync: update modules from discussions"
          git push
