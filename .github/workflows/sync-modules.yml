name: Sync Discussions to Store

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-modules.yml'
      - 'scripts/sync-modules.js'
  discussion:
    types: [created, edited, deleted]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Discussions and Generate Modules
        uses: actions/github-script@v7
        with:
          script: |
            const { syncDiscussions } = require(`${process.env.GITHUB_WORKSPACE}/scripts/sync-modules`);
            await syncDiscussions({ github, context, log: console.log });
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add mods/ store.json scripts/
          [ -d images ] && git add images/
          git diff --staged --quiet || git commit -m "sync: update modules from discussions"
          git push
